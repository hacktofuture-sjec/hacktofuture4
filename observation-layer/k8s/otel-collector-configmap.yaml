apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
data:
  otel-collector-k8s-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      k8s_events:
        auth_type: serviceAccount
      kubeletstats:
        collection_interval: 15s
        auth_type: serviceAccount
        endpoint: https://${NODE_IP}:10250
        insecure_skip_verify: true
    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 512
      batch:
        timeout: 1s
        send_batch_size: 1024
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.node.name
            - k8s.deployment.name
            - k8s.container.name
      resourcedetection:
        detectors: [env, system]
        timeout: 2s
        override: false
      resource:
        attributes:
          - key: service.name
            action: insert
            value: unknown-service
          - key: service.namespace
            action: insert
            value: lerna
          - key: deployment.environment
            action: upsert
            value: k8s
          - key: telemetry.layer
            action: insert
            value: observation-layer
      resource/canonical:
        attributes:
          - key: lerna.source.service
            from_attribute: service.name
            action: upsert
          - key: lerna.source.namespace
            from_attribute: k8s.namespace.name
            action: upsert
          - key: lerna.source.pod
            from_attribute: k8s.pod.name
            action: upsert
          - key: lerna.source.environment
            from_attribute: deployment.environment
            action: upsert
          - key: lerna.telemetry.signal_owner
            from_attribute: telemetry.layer
            action: upsert
    exporters:
      debug:
        verbosity: basic
      prometheus:
        endpoint: 0.0.0.0:8889
      loki:
        endpoint: http://loki.observability.svc.cluster.local:3100/loki/api/v1/push
      otlp/jaeger:
        endpoint: jaeger.observability.svc.cluster.local:4317
        tls:
          insecure: true
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resourcedetection, resource, resource/canonical, batch]
          exporters: [otlp/jaeger, debug]
        metrics:
          receivers: [otlp, kubeletstats]
          processors: [memory_limiter, k8sattributes, resourcedetection, resource, resource/canonical, batch]
          exporters: [prometheus, debug]
        logs:
          receivers: [otlp, k8s_events]
          processors: [memory_limiter, k8sattributes, resourcedetection, resource, resource/canonical, batch]
          exporters: [loki, debug]
