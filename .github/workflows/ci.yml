name: CI Baseline

on:
  push:
    branches: [main, "dev-*"]
  pull_request:
    branches: [main]

jobs:
  lint: # ID must match protection.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"

      # --all-extras installs all [project.optional-dependencies] groups
      # This pulls in pytest, black, flake8, etc. defined in the dev extra
      - name: Install dependencies
        run: uv sync --all-extras

      # make fl runs frontend ESLint + tsc — requires node_modules (not installed by uv)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run Lint & Format Check
        run: uv run make fl

  test: # ID must match protection.json
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: voice_to_action
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: "ci-test-key-not-for-production"
      DEBUG: "True"
      POSTGRES_DB: voice_to_action
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_URL: "redis://localhost:6379/0"
      CELERY_BROKER_URL: "redis://localhost:6379/0"
      CELERY_RESULT_BACKEND: "redis://localhost:6379/1"
      AGENT_SERVICE_URL: "http://localhost:8001"
      AGENT_SERVICE_API_KEY: "ci-test-api-key"
      OPENAI_API_KEY: "sk-ci-placeholder"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras

      # make test runs frontend tsc — requires node_modules
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run migrations
        run: cd backend && uv run python manage.py migrate --no-input

      - name: Run Tests
        run: make test