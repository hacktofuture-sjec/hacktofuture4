apiVersion: apps/v1
kind: Deployment
metadata:
  name: lerna-dashboard
  namespace: lerna
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lerna-dashboard
  template:
    metadata:
      labels:
        app: lerna-dashboard
    spec:
      containers:
        - name: dashboard
          image: lerna-dashboard:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_BASE_URL
              value: http://lerna-backend:8000
            - name: HOSTNAME
              value: "0.0.0.0"
---
apiVersion: v1
kind: Service
metadata:
  name: lerna-dashboard
  namespace: lerna
spec:
  selector:
    app: lerna-dashboard
  ports:
    - name: http
      port: 3000
      targetPort: 3000
