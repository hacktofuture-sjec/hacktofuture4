apiVersion: apps/v1
kind: Deployment
metadata:
  name: lerna-dashboard
  namespace: lerna
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lerna-dashboard
  template:
    metadata:
      labels:
        app: lerna-dashboard
    spec:
      containers:
        - name: dashboard
          image: your-registry/lerna-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: lerna-dashboard
  namespace: lerna
spec:
  selector:
    app: lerna-dashboard
  ports:
    - name: http
      port: 3000
      targetPort: 3000
