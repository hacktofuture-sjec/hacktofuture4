worker_processes 1; # Moved to the top level

events {
    # worker_connections is usually required here
    worker_connections 1024; 
}

http {
  server {
    listen 80;

    # !! VULNERABLE: alias without trailing slash !!
    # Allows: GET /static../secrets/flag.txt
    location /static {
      alias /var/www/app/;
    }

    location /health {
      return 200 '{"status":"up","service":"nginx-misconfig"}';
      add_header Content-Type application/json;
    }
  }
}