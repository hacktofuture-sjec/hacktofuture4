server {
    listen 3001;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Client-side routing (React/Vite SPA) — fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST traffic to the Red backend.
    location /api/ {
        proxy_pass http://red-backend:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy the live-log WebSocket to the Red backend.
    location /ws/ {
        proxy_pass http://red-backend:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
