kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: t3ps2
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 30090
        hostPort: 30090
        protocol: TCP
      - containerPort: 30800
        hostPort: 30800
        protocol: TCP
