apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lerna-platform
  namespace: lerna
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
spec:
  ingressClassName: nginx
  rules:
    # Browser Host header when using http://localhost:8080
    - host: localhost
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: lerna-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lerna-dashboard
                port:
                  number: 3000
    # Optional: add "127.0.0.1 lerna.local" to hosts and open http://lerna.local:8080
    - host: lerna.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: lerna-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lerna-dashboard
                port:
                  number: 3000
