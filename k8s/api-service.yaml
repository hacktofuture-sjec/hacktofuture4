---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: prod
  labels:
    app: api-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
    spec:
      volumes:
        - name: app-script
          configMap:
            name: sample-app-script
        - name: otel-deps
          emptyDir: {}
      initContainers:
        - name: install-otel
          image: python:3.11-slim
          command:
            - sh
            - -c
            - pip install --no-cache-dir --target /otel-deps opentelemetry-sdk opentelemetry-exporter-otlp-proto-http
          volumeMounts:
            - name: otel-deps
              mountPath: /otel-deps
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      containers:
        - name: api-service
          image: python:3.11-slim
          command:
            - sh
            - -c
            - python /app/app.py
          ports:
            - containerPort: 8082
          volumeMounts:
            - name: app-script
              mountPath: /app
            - name: otel-deps
              mountPath: /otel-deps
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          env:
            - name: SERVICE_NAME
              value: api-service
            - name: PORT
              value: "8082"
            - name: PYTHONPATH
              value: /otel-deps
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo.monitoring.svc.cluster.local:4318/v1/traces
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: prod
spec:
  selector:
    app: api-service
  ports:
    - port: 8082
      targetPort: 8082
      protocol: TCP
