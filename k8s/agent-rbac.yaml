apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-service
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-service
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-service
subjects:
  - kind: ServiceAccount
    name: agent-service
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agent-service