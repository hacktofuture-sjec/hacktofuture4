# Demo faulty workloads for the detection service when scoped to namespace `default`
# (see detection-service K8S_NAMESPACE_SCOPE / DETECTION_LOG_QUERY).
# Apply: kubectl apply -f k8s/detection-demo-errors.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: detection-demo-crashloop
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: detection-demo-crashloop
  template:
    metadata:
      labels:
        app: detection-demo-crashloop
    spec:
      containers:
        - name: crashloop
          image: lerna-backend:latest
          imagePullPolicy: Never
          command:
            - /bin/sh
            - -c
            - |
              echo "failed: intentional detection demo crash"
              exit 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: detection-demo-unready
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: detection-demo-unready
  template:
    metadata:
      labels:
        app: detection-demo-unready
        detection-demo-state: unready
    spec:
      containers:
        - name: unready
          image: lerna-dashboard:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 1
---
apiVersion: v1
kind: Service
metadata:
  name: detection-demo-unready
  namespace: default
spec:
  selector:
    app: detection-demo-unready
    detection-demo-state: unready
  ports:
    - name: http
      port: 3000
      targetPort: 3000
