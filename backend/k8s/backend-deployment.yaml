apiVersion: apps/v1
kind: Deployment
metadata:
  name: lerna-backend
  namespace: lerna
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lerna-backend
  template:
    metadata:
      labels:
        app: lerna-backend
    spec:
      serviceAccountName: lerna-backend
      containers:
        - name: backend
          image: lerna-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: PROMETHEUS_URL
              value: http://prometheus.observability.svc.cluster.local:9090
            - name: LOKI_URL
              value: http://loki.observability.svc.cluster.local:3100
            - name: JAEGER_URL
              value: http://jaeger.observability.svc.cluster.local:16686
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: AGENTS_SERVICE_URL
              value: http://lerna-agents.lerna.svc.cluster.local:8000
            - name: ENABLE_K8S_POLLER
              value: "true"
            - name: POLL_INTERVAL_SECONDS
              value: "15"
            - name: AGENTS_ORCHESTRATOR_TIMEOUT_SECONDS
              value: "120"
            # Fallback daily LLM cap (USD) before any value is saved via Settings UI / SQLite
            - name: LERNA_DEFAULT_MAX_DAILY_AGENT_COST_USD
              value: "100"
---
apiVersion: v1
kind: Service
metadata:
  name: lerna-backend
  namespace: lerna
spec:
  selector:
    app: lerna-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
