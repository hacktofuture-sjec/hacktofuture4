apiVersion: v1
kind: ServiceAccount
metadata:
  name: lerna-backend
  namespace: lerna
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lerna-backend-cluster-read
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "services", "endpoints", "events"]
    verbs: ["get", "list", "watch"]
  # Log subresource is separate from pods in RBAC (kubectl logs / GET .../pods/*/log).
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lerna-backend-cluster-read
subjects:
  - kind: ServiceAccount
    name: lerna-backend
    namespace: lerna
roleRef:
  kind: ClusterRole
  name: lerna-backend-cluster-read
  apiGroup: rbac.authorization.k8s.io
