version: '3.8'

services:
  spire-server:
    image: ghcr.io/spiffe/spire-server:1.8.6
    container_name: spire-server
    volumes:
      - ./conf/server/server.conf:/opt/spire/conf/server/server.conf:ro
      - spire-server-data:/opt/spire/data/server
    command: ["-config", "/opt/spire/conf/server/server.conf"]

  spire-agent:
    image: ghcr.io/spiffe/spire-agent:1.8.6
    container_name: spire-agent
    pid: host
    depends_on:
      - spire-server
    volumes:
      - ./conf/agent/agent.conf:/opt/spire/conf/agent/agent.conf:ro
      - spire-agent-socket:/opt/spire/sockets
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["-config", "/opt/spire/conf/agent/agent.conf", "-joinToken", "${SPIRE_JOIN_TOKEN:?SPIRE_JOIN_TOKEN must be set}"]

  mock-agent:
    build:
      context: ./mock_agent
      dockerfile: Dockerfile
    container_name: mock-agent
    depends_on:
      - spire-agent
    volumes:
      - spire-agent-socket:/opt/spire/sockets:ro
    environment:
      - SPIFFE_ENDPOINT_SOCKET=unix:///opt/spire/sockets/workload_api.sock
      - PYTHONUNBUFFERED=1
    labels:
      - "app=mock-agent"

  analytics-engine:
    build:
      context: ./analytics_engine
      dockerfile: Dockerfile
    container_name: analytics-engine
    ports:
      - "8000:8000"

  tetragon:
    image: quay.io/cilium/tetragon:v1.0.2
    container_name: tetragon
    pid: host
    privileged: true
    volumes:
      - /sys/kernel/btf/vmlinux:/var/lib/tetragon/btf:ro
      - ./tetragon/tracing_policy.yaml:/etc/tetragon/tracing_policy.yaml:ro
    command: ["--tracing-policy", "/etc/tetragon/tracing_policy.yaml"]

  parseable:
    image: parseable/parseable:latest
    container_name: parseable
    ports:
      - "8081:8000"
    environment:
      - P_USERNAME=${PARSEABLE_USERNAME:?PARSEABLE_USERNAME must be set}
      - P_PASSWORD=${PARSEABLE_PASSWORD:?PARSEABLE_PASSWORD must be set}
      - P_STAGING_DIR=/parseable/staging
      - P_FS_DIR=/parseable/data
    command: ["parseable", "local-store"]
    entrypoint: []
    volumes:
      - parseable-data:/parseable/data
      - parseable-staging:/parseable/staging

  fluent-bit:
    image: fluent/fluent-bit:3.0.4
    container_name: fluent-bit
    environment:
      - PARSEABLE_BASIC_AUTH=${PARSEABLE_BASIC_AUTH:?PARSEABLE_BASIC_AUTH must be set}
    volumes:
      - ./fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - parseable
      - tetragon

  tetragon-processor:
    build:
      context: .
      dockerfile: Dockerfile.tetragon-processor
    container_name: tetragon-processor
    depends_on:
      - parseable
      - analytics-engine
    environment:
      - PARSEABLE_URL=http://parseable:8000
      - PARSEABLE_USERNAME=${PARSEABLE_USERNAME:?PARSEABLE_USERNAME must be set}
      - PARSEABLE_PASSWORD=${PARSEABLE_PASSWORD:?PARSEABLE_PASSWORD must be set}
      - ANALYTICS_ENGINE_URL=http://analytics-engine:8000
      - PYTHONUNBUFFERED=1
    labels:
      - "app=tetragon-processor"

  enforcement-bridge:
    build:
      context: .
      dockerfile: Dockerfile.enforcement-bridge
    container_name: enforcement-bridge
    depends_on:
      - analytics-engine
    environment:
      - ANALYTICS_ENGINE_URL=http://analytics-engine:8000
      - OPA_URL=http://opa:8181
      - CILIUM_API_URL=http://cilium-agent:8000/api/v1
      - TETRAGON_API_URL=http://tetragon:54321
      - PYTHONUNBUFFERED=1
    labels:
      - "app=enforcement-bridge"

  grafana:
    image: grafana/grafana:10.4.1
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=yes
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - parseable

volumes:
  spire-server-data:
  spire-agent-socket:
  parseable-data:
  parseable-staging:
