apiVersion: apps/v1
kind: Deployment
metadata:
  name: lerna-agents
  namespace: lerna
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lerna-agents
  template:
    metadata:
      labels:
        app: lerna-agents
    spec:
      containers:
        - name: agents
          image: lerna-agents:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: PROMETHEUS_URL
              value: http://prometheus.observability.svc.cluster.local:9090
            - name: LOKI_URL
              value: http://loki.observability.svc.cluster.local:3100
            - name: JAEGER_URL
              value: http://jaeger.observability.svc.cluster.local:16686
            - name: REDIS_URL
              value: redis://redis.lerna.svc.cluster.local:6379/0
            - name: QDRANT_URL
              value: http://qdrant.lerna.svc.cluster.local:6333
---
apiVersion: v1
kind: Service
metadata:
  name: lerna-agents
  namespace: lerna
spec:
  selector:
    app: lerna-agents
  ports:
    - name: http
      port: 8000
      targetPort: 8000
