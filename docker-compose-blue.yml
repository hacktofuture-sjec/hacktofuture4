# HTF — Blue Team only compose
# Runs just the Blue Agent backend (8002) and frontend (3002) on an
# isolated `htf-blue-network`. Use this when iterating on the defender
# side without spinning up the Red stack.
#
# Usage:
#   docker-compose -f docker-compose-blue.yml up --build
#   docker-compose -f docker-compose-blue.yml down
#
# Prerequisite: copy .env.example -> .env
#   cp .env.example .env

services:
  blue-backend:
    container_name: htf-blue-backend
    build:
      context: .
      dockerfile: blue_agent/backend/Dockerfile
    image: htf/blue-backend:dev
    ports:
      - "8002:8002"
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONPATH: /app
    volumes:
      - ./blue_agent:/app/blue_agent
      - ./core:/app/core
      - ./shared:/app/shared
      - ./config:/app/config
    command: >
      uvicorn blue_agent.backend.main:app
      --host 0.0.0.0 --port 8002 --reload
    networks:
      - htf-blue-network

  blue-frontend:
    container_name: htf-blue-frontend
    build:
      context: ./blue_agent/frontend
      dockerfile: Dockerfile
      target: build
    image: htf/blue-frontend:dev
    ports:
      - "3002:3002"
    env_file:
      - path: .env
        required: false
    environment:
      VITE_BLUE_API_URL: http://localhost:8002
      VITE_BLUE_WS_URL: ws://localhost:8002/ws/blue
    volumes:
      - ./blue_agent/frontend/src:/app/src
      - ./blue_agent/frontend/public:/app/public
      - ./blue_agent/frontend/index.html:/app/index.html
      - ./blue_agent/frontend/vite.config.ts:/app/vite.config.ts
      - ./blue_agent/frontend/tsconfig.json:/app/tsconfig.json
    command: npm run dev -- --host 0.0.0.0 --port 3002
    depends_on:
      - blue-backend
    networks:
      - htf-blue-network

networks:
  htf-blue-network:
    driver: bridge
    name: htf-blue-network
