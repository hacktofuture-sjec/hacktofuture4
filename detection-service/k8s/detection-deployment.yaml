apiVersion: apps/v1
kind: Deployment
metadata:
  name: lerna-detection
  namespace: lerna
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lerna-detection
  template:
    metadata:
      labels:
        app: lerna-detection
    spec:
      serviceAccountName: lerna-backend
      containers:
        - name: detection
          image: lerna-detection:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: LOKI_URL
              value: http://loki.observability.svc.cluster.local:3100
            - name: PROMETHEUS_URL
              value: http://prometheus.observability.svc.cluster.local:9090
            - name: JAEGER_URL
              value: http://jaeger.observability.svc.cluster.local:16686
            - name: REDIS_URL
              value: redis://redis.lerna.svc.cluster.local:6379/0
            - name: AGENTS_SERVICE_URL
              value: http://lerna-agents.lerna.svc.cluster.local:8000
            - name: DETECTION_POLL_INTERVAL_SECONDS
              value: "15"
            - name: DETECTION_DEDUPE_TTL_SECONDS
              value: "300"
---
apiVersion: v1
kind: Service
metadata:
  name: lerna-detection
  namespace: lerna
spec:
  selector:
    app: lerna-detection
  ports:
    - name: http
      port: 8000
      targetPort: 8000
